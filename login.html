<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Trucker - Login</title>
<style>
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#134e5e 0%, #1fa2a6 50%, #38ef7d 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}}
.panel{
  display:flex;
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  width:100%;max-width:860px;
  box-shadow:0 24px 60px rgba(0,0,0,0.35);
}
.panel-left{
  background:linear-gradient(145deg,var(--navy-dark),var(--navy));
  width:340px;
  flex-shrink:0;
  padding:48px 36px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;
  overflow:hidden;
}
.panel-left::before{
  content:'🚛';font-size:180px;
  position:absolute;bottom:-30px;right:-30px;
  opacity:0.07;
}
.panel-left h1{
  color:#fff;font-size:26px;font-weight:800;line-height:1.2;margin-bottom:12px;
}
.panel-left h1 span{color:var(--accent);}
.panel-left p{color:rgba(255,255,255,0.65);font-size:14px;line-height:1.6;}
.features{margin-top:32px;display:flex;flex-direction:column;gap:14px;}
.feat{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.8);font-size:13px;}
.feat-icon{width:32px;height:32px;background:rgba(245,166,35,0.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.panel-right{flex:1;padding:48px 40px;}
.panel-right h2{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.panel-right .sub{color:var(--muted);font-size:13px;margin-bottom:30px;}
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:2px solid var(--border);}
.tab{
  padding:10px 22px;font-size:14px;font-weight:600;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all 0.15s;
}
.tab.active{color:var(--navy);border-bottom-color:var(--accent);}
.form-section{display:none;}
.form-section.active{display:block;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;}
input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:9px;font-size:14px;font-family:inherit;color:var(--navy);
  outline:none;transition:border-color 0.15s;
}
input:focus{border-color:var(--navy);}
.btn{
  width:100%;padding:13px;border:none;border-radius:9px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.15s;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-dark);}
.msg{text-align:center;font-size:13px;margin-top:16px;padding:10px;border-radius:8px;display:none;}
.msg.error{background:#fdecea;color:var(--danger);}
.msg.success{background:#eafaf0;color:var(--success);}
@media(max-width:640px){.panel-left{display:none;}.panel-right{padding:36px 24px;}}
.logo-box{
    display:flex;
    justify-content:center;
    margin-bottom:25px;
}

.logo-box img{
    width:120px;
    height:120px;
    object-fit:contain;
    border-radius:15px;
    background:white;
    padding:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<div class="panel-left">

    <div class="logo-box">
        <img src="logo.png" alt="Budget Trucker Logo">
    </div>

    <h1>Budget<span>Trucker</span> System</h1>
    <p>Complete financial management for trucking businesses.</p>
    <div class="features">
      <div class="feat"><div class="feat-icon">💰</div>Income & Expense Tracking</div>
      <div class="feat"><div class="feat-icon">⛽</div>Fuel Monitoring</div>
      <div class="feat"><div class="feat-icon">🚛</div>Route Management</div>
      <div class="feat"><div class="feat-icon">📊</div>Reports & Analytics</div>
    </div>
  </div>
  <div class="panel-right">
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to manage your trucking finances</p>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input id="loginUser" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPass" type="password" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary" onclick="login()">Sign In →</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- REGISTER -->
    <div class="form-section" id="registerForm">
      <div class="form-group">
        <label>Username</label>
        <input id="regUser" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="regPass" type="password" placeholder="Choose a password">
      </div>
      <button class="btn btn-primary" onclick="register()">Create Account →</button>
      <div class="msg" id="regMsg"></div>
    </div>
  </div>
</div>

<script>
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===(tab==='login'?0:1));});
  document.getElementById('loginForm').classList.toggle('active',tab==='login');
  document.getElementById('registerForm').classList.toggle('active',tab==='register');
}
function showMsg(id,text,type){
  let el=document.getElementById(id);
  el.textContent=text;el.className='msg '+type;el.style.display='block';
}
function register(){
  let user=document.getElementById('regUser').value.trim();
  let pass=document.getElementById('regPass').value.trim();
  if(!user||!pass){showMsg('regMsg','Please fill in all fields.','error');return;}
  let users=JSON.parse(localStorage.getItem('users'))||[];
  if(users.find(u=>u.username===user)){showMsg('regMsg','Username already exists.','error');return;}
  users.push({username:user,password:pass});
  localStorage.setItem('users',JSON.stringify(users));
  showMsg('regMsg','Account created! You can now log in.','success');
  setTimeout(()=>switchTab('login'),1500);
}
function login(){
  let user=document.getElementById('loginUser').value.trim();
  let pass=document.getElementById('loginPass').value.trim();
  if(!user||!pass){showMsg('loginMsg','Please enter your credentials.','error');return;}
  let users=JSON.parse(localStorage.getItem('users'))||[];
  let valid=users.find(u=>u.username===user&&u.password===pass);
  if(valid){
    localStorage.setItem('loggedInUser',user);
    showMsg('loginMsg','Login successful! Redirecting…','success');
    setTimeout(()=>{window.location.href='dashboard.html';},900);
  }else{
    showMsg('loginMsg','Invalid username or password.','error');
  }
}
</script>
</body>
</html>
